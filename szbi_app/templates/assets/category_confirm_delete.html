{% extends "base.html" %}

{% block title %}Usuń kategorię - SZBI{% endblock %}

{% block content %}
<h2>Usuwanie kategorii</h2>

<p>Czy na pewno chcesz usunąć kategorię <strong>[{{ object.code }}] {{ object.name }}</strong>?</p>

<p class="alert-text-danger">Ta operacja jest nieodwracalna!</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Tak, usuń</button>
    <a href="{% url 'assets:category_list' %}" class="btn btn-outline">Anuluj</a>
</form>
{% endblock %}
